<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff477e;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .gif-container img {
            max-width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
            z-index: 5;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff5c8a;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            z-index: 10;
            /* Smooth transitions for moving around the screen */
            transition: left 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        top 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        background-color 0.2s;
        }

        /* Honda Accord Transformation State */
        .accord-mode {
            background-image: url('honda.png') !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            background-color: transparent !important;
            color: transparent !important; /* Hides the text "No" */
            width: 140px;  
            height: 80px;
            box-shadow: none !important;
            border-radius: 0 !important;
        }

        /* Success Card Styling */
        .hidden { display: none !important; }
        .celebration h1 { color: #2a9d8f; }
    </style>
</head>
<body>

    <div class="container" id="questionCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute GIF">
        </div>
        <h1>Hey! 👋</h1>
        <p>I really enjoy spending time with you. Will you go out on a date with me?</p>
        
        <div class="btn-group">
            <button class="btn" id="yesBtn">Yes!</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <div class="container hidden" id="successCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/26vUxArWImnSO6bDi/giphy.gif" alt="Success GIF">
        </div>
        <h1>Let's go! 🎉</h1>
        <p>Can't wait. I'll message you details soon!</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');

        let transformed = false;

        // When "Yes" is selected
        yesBtn.addEventListener('click', () => {
            questionCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });

        // Function to move the car away from the cursor
        function evadeMouse(e) {
            // Turn it into the Honda Accord on the very first proximity detection
            if (!transformed) {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${rect.left}px`;
                noBtn.style.top = `${rect.top}px`;
                noBtn.style.margin = '0';
                noBtn.classList.add('accord-mode');
                transformed = true;
            }

            // Calculate a random new position within the window borders
            // Keeps the car 100px away from the absolute edges so it doesn't get cut off
            const padding = 100;
            const newX = Math.random() * (window.innerWidth - noBtn.offsetWidth - (padding * 2)) + padding;
            const newY = Math.random() * (window.innerHeight - noBtn.offsetHeight - (padding * 2)) + padding;

            // Apply the new coordinates instantly
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        }

        // Detects when the cursor enters the button boundary (Desktop)
        noBtn.addEventListener('mouseenter', evadeMouse);

        // Also tracks general mouse movement across the whole screen.
        // If her cursor gets within 80 pixels of the car, it will automatically bolt!
        document.addEventListener('mousemove', (e) => {
            if (!transformed) return; // Only track proximity after it turns into the car
            
            const carRect = noBtn.getBoundingClientRect();
            const carCenterX = carRect.left + (carRect.width / 2);
            const carCenterY = carRect.top + (carRect.height / 2);

            // Calculate distance between cursor and center of the car
            const distance = Math.hypot(e.clientX - carCenterX, e.clientY - carCenterY);

            // Trigger escape if cursor gets too close (80 pixels)
            if (distance < 80) {
                evadeMouse(e);
            }
        });

        // Mobile layout override (teleports on finger tap)
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            evadeMouse(e);
        });
    </script>
</body>
</html>
