<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Premium garage/car lounge aesthetic (Deep Slate Gray to Charcoal) */
            background: linear-gradient(135deg, #1f242d 0%, #111318 100%);
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(35, 41, 51, 0.95);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            max-width: 440px;
            width: 90%;
            position: relative;
            z-index: 5;
        }

        /* Ambient glowing trim at the top of the card */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 2px;
            background: linear-gradient(90deg, transparent, #00b4d8, transparent);
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #00b4d8; /* Premium interior dash blue */
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        p {
            color: #9cb1c9;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            min-height: 80px;
            align-items: center;
        }

        .btn {
            padding: 14px 38px;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #00b4d8;
            color: white;
            box-shadow: 0 4px 20px rgba(0, 180, 216, 0.25);
        }

        #yesBtn:hover {
            transform: scale(1.05);
            background-color: #0096b4;
            box-shadow: 0 6px 25px rgba(0, 180, 216, 0.4);
        }

        #noBtn {
            background-color: #2c3545;
            color: #a5b4fc;
            /* Ultra-smooth interpolation physics for moving the car */
            transition: left 0.25s cubic-bezier(0.075, 0.82, 0.165, 1), 
                        top 0.25s cubic-bezier(0.075, 0.82, 0.165, 1);
        }

        /* Honda Accord State - Zeroed out layout parameters */
        .accord-mode {
            background-image: url('honda.png') !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            background-color: transparent !important;
            border: none !important;
            color: transparent !important; 
            width: 140px;  
            height: 75px;
            box-shadow: none !important;
            border-radius: 0 !important;
        }

        /* Success Card Styling */
        .hidden { display: none !important; }
        
        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .celebration h1 {
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="container" id="questionCard">
        <h1>Let's take a cruise?</h1>
        <div class="subtitle">System Status: Ready</div>
        <p>I always lose track of miles when I'm hanging out with you. Would you want to go on a date with me?</p>
        
        <div class="btn-group">
            <button class="btn" id="yesBtn">Yes, let's drive</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <div class="container hidden celebration" id="successCard">
        <div class="success-icon">📍</div>
        <h1>Destination Locked!</h1>
        <p>Route calculated successfully. I'll text you the coordinates and the pickup time soon.</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');

        let transformed = false;
        let returnTimer = null;

        yesBtn.addEventListener('click', () => {
            questionCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });

        function evadeMouse() {
            clearTimeout(returnTimer);

            // Turn into the Honda Accord on first approach
            if (!transformed) {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${rect.left}px`;
                noBtn.style.top = `${rect.top}px`;
                noBtn.style.margin = '0';
                noBtn.classList.add('accord-mode');
                transformed = true;
            }

            // --- STRICT SCREEN COUNTER MEASURES ---
            const carWidth = 140; 
            const carHeight = 75;
            const safetyMargin = 25; // Keeps it safely away from edge bezels

            // Calculate exact maximum bounds based on real-time screen width/height
            const minX = safetyMargin;
            const maxX = window.innerWidth - carWidth - safetyMargin;
            const minY = safetyMargin;
            const maxY = window.innerHeight - carHeight - safetyMargin;

            // Generate precise coordinates inside the visible frame
            const targetX = Math.random() * (maxX - minX) + minX;
            const targetY = Math.random() * (maxY - minY) + minY;

            noBtn.style.left = `${targetX}px`;
            noBtn.style.top = `${targetY}px`;

            // Start 5-second idle countdown to return the button home
            startReturnTimer();
        }

        function startReturnTimer() {
            returnTimer = setTimeout(() => {
                resetCarHome();
            }, 5000);
        }

        function resetCarHome() {
            if (!transformed) return;

            // Undo styling structures temporarily to locate standard HTML slot
            noBtn.classList.remove('accord-mode');
            noBtn.style.position = 'relative';
            noBtn.style.left = '';
            noBtn.style.top = '';

            const originalSlot = noBtn.getBoundingClientRect();

            // Reactivate properties to handle the glide home animation smoothly
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${window.innerWidth / 2}px`;
            noBtn.style.top = `${window.innerHeight / 2}px`;
            noBtn.classList.add('accord-mode');

            setTimeout(() => {
                noBtn.style.left = `${originalSlot.left}px`;
                noBtn.style.top = `${originalSlot.top}px`;

                setTimeout(() => {
                    noBtn.classList.remove('accord-mode');
                    noBtn.style.position = 'relative';
                    noBtn.style.left = '';
                    noBtn.style.top = '';
                    noBtn.style.margin = '';
                    transformed = false;
                }, 250); 
            }, 30);
        }

        // Proximity detection listeners
        noBtn.addEventListener('mouseenter', evadeMouse);

        document.addEventListener('mousemove', (e) => {
            if (!transformed) return;
            
            const carRect = noBtn.getBoundingClientRect();
            const carCenterX = carRect.left + (carRect.width / 2);
            const carCenterY = carRect.top + (carRect.height / 2);

            const distance = Math.hypot(e.clientX - carCenterX, e.clientY - carCenterY);

            // Checks if pointer enters a clean 100px bubble around the car frame
            if (distance < 100) {
                evadeMouse();
            }
        });

        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            evadeMouse();
        });
    </script>
</body>
</html>
