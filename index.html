<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Day Invitation 🏎️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Race track asphalt aesthetic background */
            background: radial-gradient(circle, #2b2b2b 0%, #111111 100%);
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Subtle track lines in the background */
        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 10px;
            background: repeating-linear-gradient(90deg, #fff, #fff 40px, transparent 40px, transparent 80px);
            top: 15%; opacity: 0.1;
        }
        body::after {
            content: '';
            position: absolute;
            width: 100%; height: 10px;
            background: repeating-linear-gradient(90deg, #fff, #fff 40px, transparent 40px, transparent 80px);
            bottom: 15%; opacity: 0.1;
        }

        .container {
            text-align: center;
            background: rgba(30, 30, 30, 0.95);
            padding: 40px;
            border-radius: 16px;
            border: 3px solid #ff4757; /* Brake caliper red */
            box-shadow: 0 0 25px rgba(255, 71, 87, 0.3);
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 5;
        }

        h1 {
            color: #ffffff;
            font-size: 2.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-style: italic;
        }

        .subtitle {
            color: #ff4757;
            font-size: 1.1rem;
            margin-bottom: 25px;
            letter-spacing: 4px;
            font-family: sans-serif;
            font-weight: bold;
        }

        p {
            color: #cccccc;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-family: sans-serif;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            min-height: 80px;
            align-items: center;
        }

        .btn {
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 6px; /* Boxier, aggressive racing look */
            cursor: pointer;
            text-transform: uppercase;
            font-style: italic;
            transition: transform 0.1s ease;
        }

        #yesBtn {
            background-color: #2ed573; /* Green light / Go */
            color: white;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1) skewX(-6deg);
            background-color: #26af5c;
        }

        #noBtn {
            background-color: #333333;
            color: #888888;
            border: 2px solid #444444;
            /* Smooth physics-based interpolation transition */
            transition: left 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        top 0.25s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.2s;
        }

        /* Honda Accord - Locked inside track boundaries */
        .accord-mode {
            background-image: url('honda.png') !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            background-color: transparent !important;
            border: none !important;
            color: transparent !important; 
            width: 150px;  
            height: 85px;
            box-shadow: none !important;
            border-radius: 0 !important;
            transform: skewX(-10deg); /* Racing lean style */
        }

        /* Success Card (CEL Triggered) */
        .hidden { display: none !important; }
        
        .cel-light {
            width: 80px;
            margin: 0 auto 20px;
            fill: #ffa500; /* Amber Check Engine Light color */
            filter: drop-shadow(0 0 8px #ffa500);
        }
        
        .celebration h1 {
            color: #ffa500; /* Cel amber */
        }
    </style>
</head>
<body>

    <div class="container" id="questionCard">
        <h1>SEND IT?</h1>
        <div class="subtitle">STAGE 1 INVITATION</div>
        <p>I really clear my lap times when I'm hanging out with you. Let's line up on the grid for a real date?</p>
        
        <div class="btn-group">
            <button class="btn" id="yesBtn">YES (FULL SEND)</button>
            <button class="btn" id="noBtn">NO</button>
        </div>
    </div>

    <div class="container hidden celebration" id="successCard">
        <svg class="cel-light" viewBox="0 0 24 24">
            <path d="M19,8H17.5V6H16V8H11V5H13V3.5H8V5H10V8H5A2,2 0 0,0 3,10V17A2,2 0 0,0 5,19H7V21H10V19H14V21H17V19H19A2,2 0 0,0 21,17V10A2,2 0 0,0 19,8M19,17H5V10H16V12H17.5V10H19V17Z"/>
        </svg>
        <h1>VTEC KICKED IN 🎉</h1>
        <p>Excellent launch control. Destination locked into the navigation system. I'll text you the coordinates shortly.</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');

        let transformed = false;
        let returnTimer = null;

        yesBtn.addEventListener('click', () => {
            questionCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });

        function trackDayEvade() {
            clearTimeout(returnTimer);

            if (!transformed) {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${rect.left}px`;
                noBtn.style.top = `${rect.top}px`;
                noBtn.style.margin = '0';
                noBtn.classList.add('accord-mode');
                transformed = true;
            }

            // --- UNBREAKABLE VISIBLE BOUNDARIES ---
            // Car dimensions + pixel padding safety buffer
            const carWidth = 160; 
            const carHeight = 95;

            // These limiters guarantee the math NEVER targets a spot off-screen
            const minX = 30;
            const maxX = window.innerWidth - carWidth;
            const minY = 30;
            const maxY = window.innerHeight - carHeight;

            const targetX = Math.random() * (maxX - minX) + minX;
            const targetY = Math.random() * (maxY - minY) + minY;

            noBtn.style.left = `${targetX}px`;
            noBtn.style.top = `${targetY}px`;

            // Pull over to the shoulder if she idles for 5 seconds
            startPitStopTimer();
        }

        function startPitStopTimer() {
            returnTimer = setTimeout(() => {
                pullIntoPits();
            }, 5000);
        }

        function pullIntoPits() {
            if (!transformed) return;

            // Instantly grab target home specs down in the HTML structure
            noBtn.classList.remove('accord-mode');
            noBtn.style.position = 'relative';
            noBtn.style.left = '';
            noBtn.style.top = '';

            const pitLaneRect = noBtn.getBoundingClientRect();

            // Relock to fly back seamlessly 
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${window.innerWidth / 2}px`;
            noBtn.style.top = `${window.innerHeight / 2}px`;
            noBtn.classList.add('accord-mode');

            setTimeout(() => {
                noBtn.style.left = `${pitLaneRect.left}px`;
                noBtn.style.top = `${pitLaneRect.top}px`;

                setTimeout(() => {
                    noBtn.classList.remove('accord-mode');
                    noBtn.style.position = 'relative';
                    noBtn.style.left = '';
                    noBtn.style.top = '';
                    noBtn.style.margin = '';
                    transformed = false;
                }, 250); 
            }, 30);
        }

        // Proximity radar configurations
        noBtn.addEventListener('mouseenter', trackDayEvade);

        document.addEventListener('mousemove', (e) => {
            if (!transformed) return;
            
            const carRect = noBtn.getBoundingClientRect();
            const carCenterX = carRect.left + (carRect.width / 2);
            const carCenterY = carRect.top + (carRect.height / 2);

            const distance = Math.hypot(e.clientX - carCenterX, e.clientY - carCenterY);

            // If her mouse gets within 110px radius, trigger defensive driving lines
            if (distance < 110) {
                trackDayEvade();
            }
        });

        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            trackDayEvade();
        });
    </script>
</body>
</html>
