<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            max-width: 450px;
            width: 90%;
            position: relative;
        }

        h1 {
            color: #ff477e;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .gif-container img {
            max-width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
            z-index: 5;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff5c8a;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            z-index: 10;
            /* Smooth transitions for driving around */
            transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        top 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        width 0.2s, height 0.2s, background-color 0.2s;
        }

        /* Honda Accord Transformation State */
        .accord-mode {
            background-image: url('honda.png') !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            background-color: transparent !important;
            color: transparent !important; /* Hides "No" text */
            width: 140px;  
            height: 80px;
            box-shadow: none !important;
            border-radius: 0 !important;
        }

        /* Success Card Styling */
        .hidden { display: none !important; }
        .celebration h1 { color: #2a9d8f; }
    </style>
</head>
<body>

    <div class="container" id="questionCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute GIF">
        </div>
        <h1>Hey! 👋</h1>
        <p>I really enjoy spending time with you. Will you go out on a date with me?</p>
        
        <div class="btn-group" id="btnGroup">
            <button class="btn" id="yesBtn">Yes!</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <div class="container hidden" id="successCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/26vUxArWImnSO6bDi/giphy.gif" alt="Success GIF">
        </div>
        <h1>Let's go! 🎉</h1>
        <p>Can't wait. I'll message you details soon!</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');
        const btnGroup = document.getElementById('btnGroup');

        let transformed = false;
        let returnTimer = null;

        // When "Yes" is selected
        yesBtn.addEventListener('click', () => {
            questionCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });

        // Function to move the car away from the cursor
        function evadeMouse() {
            // Clear any active return timers since she is currently interacting with it
            clearTimeout(returnTimer);

            if (!transformed) {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${rect.left}px`;
                noBtn.style.top = `${rect.top}px`;
                noBtn.style.margin = '0';
                noBtn.classList.add('accord-mode');
                transformed = true;
            }

            // Define strict padding to keep the entire car completely on-screen
            const padX = 150; // width of car plus safety buffer
            const padY = 90;  // height of car plus safety buffer

            // Math.max and Math.min guarantee coordinates stay inside viewport boundaries
            const minX = 20;
            const maxX = window.innerWidth - padX;
            const minY = 20;
            const maxY = window.innerHeight - padY;

            const newX = Math.random() * (maxX - minX) + minX;
            const newY = Math.random() * (maxY - minY) + minY;

            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;

            // Start the 5-second countdown to return home
            startReturnTimer();
        }

        // Starts a timer that triggers if she doesn't hover over the car for 5 seconds
        function startReturnTimer() {
            returnTimer = setTimeout(() => {
                resetCarHome();
            }, 5000); // 5000 milliseconds = 5 seconds
        }

        // Drives the car back to the menu card and turns it back into a button
        function resetCarHome() {
            if (!transformed) return;

            // Turn off fixed positioning temporary to find exactly where it belongs naturally
            noBtn.classList.remove('accord-mode');
            noBtn.style.position = 'relative';
            noBtn.style.left = '';
            noBtn.style.top = '';

            // Grab the real home coordinates inside the layout box
            const homeRect = noBtn.getBoundingClientRect();

            // Re-apply fixed positioning instantly to animate it driving smoothly "home"
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${window.innerWidth / 2}px`; // Temporary mid-point animation trick
            noBtn.style.top = `${window.innerHeight / 2}px`;
            noBtn.classList.add('accord-mode');

            // Small timeout allows the browser to process coordinates and smoothly slide home
            setTimeout(() => {
                noBtn.style.left = `${homeRect.left}px`;
                noBtn.style.top = `${homeRect.top}px`;

                // Once it reaches home, change it back to a standard gray button
                setTimeout(() => {
                    noBtn.classList.remove('accord-mode');
                    noBtn.style.position = 'relative';
                    noBtn.style.left = '';
                    noBtn.style.top = '';
                    noBtn.style.margin = '';
                    transformed = false;
                }, 300); // Wait for slide animation to finish
            }, 50);
        }

        // Proximity detection triggers
        noBtn.addEventListener('mouseenter', evadeMouse);

        document.addEventListener('mousemove', (e) => {
            if (!transformed) return;
            
            const carRect = noBtn.getBoundingClientRect();
            const carCenterX = carRect.left + (carRect.width / 2);
            const carCenterY = carRect.top + (carRect.height / 2);

            const distance = Math.hypot(e.clientX - carCenterX, e.clientY - carCenterY);

            // Trigger escape run if cursor gets closer than 90 pixels
            if (distance < 90) {
                evadeMouse();
            }
        });

        // Mobile touch interaction mapping
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            evadeMouse();
        });
    </script>
</body>
</html>
