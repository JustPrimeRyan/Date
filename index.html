<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Necessary for the car to drive 'away' */
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            max-width: 450px;
            width: 90%;
            transition: all 0.5s ease;
        }

        h1 {
            color: #ff477e;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #4a4a4a;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .gif-container img {
            max-width: 200px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px; /* Space for the transformation */
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background-color: #ff477e;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background-color: #ff5c8a;
        }

        /* Initial 'No' button state */
        #noBtn {
            background-color: #6c757d;
            color: white;
            position: relative; /* Crucial for initial positioning */
            z-index: 10;
        }

        /* Honda Accord Transformation state (via JavaScript) */
        .btn.noBtn-hovered {
            background-color: #e0e0e0; /* Gray/Silver car color */
            color: transparent; /* Hide the word 'No' */
            padding: 0;
            width: 100px; /* Simulate car length */
            height: 45px;  /* Simulate car height */
            border-radius: 8px; /* Boxier car shape */
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        /* Adding 'headlights' and details using pseudo-elements */
        .btn.noBtn-hovered::before {
            content: '';
            position: absolute;
            left: 5px; top: 10px; width: 10px; height: 10px;
            background: #fff; /* Headlight color */
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
        }
        
        .btn.noBtn-hovered::after {
            content: '';
            position: absolute;
            right: 15px; top: 12px; width: 12px; height: 2px;
            background: #888; /* Simple grill detail */
            border-radius: 2px;
        }

        /* The 'Driving Away' animation sequence */
        @keyframes driveAway {
            0% { transform: translate(0, 0); opacity: 1; }
            30% { transform: translate(30vw, -10vh); opacity: 1; } /* Initial movement */
            70% { transform: translate(60vw, 5vh); opacity: 0.8; } /* Drifting */
            100% { transform: translate(110vw, -30vh) scale(0.5); opacity: 0; } /* Drives off-screen & fades */
        }

        .driving {
            position: fixed !important; /* Lock to viewport */
            pointer-events: none; /* Can't click it while driving */
            z-index: 1000 !important;
            animation: driveAway 2.5s ease-out forwards;
        }

        /* Success State */
        .hidden { display: none !important; }
        .container.celebration { background-color: rgba(230, 255, 230, 0.9); }
        .celebration h1 { color: #2a9d8f; }
        .celebration .gif-container img { max-width: 250px; }

    </style>
</head>
<body>

    <!-- Main Invitation Card -->
    <div class="container" id="questionCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute GIF">
        </div>
        <h1>Hey! 👋</h1>
        <p>I really enjoy spending time with you. Will you go out on a date with me?</p>
        
        <div class="btn-group" id="buttonContainer">
            <button class="btn" id="yesBtn">Yes!</button>
            <button class="btn" id="noBtn">No</button>
        </div>
    </div>

    <!-- Success Screen -->
    <div class="container hidden celebration" id="successCard">
        <div class="gif-container">
            <img src="https://media.giphy.com/media/26vUxArWImnSO6bDi/giphy.gif" alt="Success GIF">
        </div>
        <h1>Awesome! 🎉</h1>
        <p>Looking forward to it. I'll message you details soon!</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionCard = document.getElementById('questionCard');
        const successCard = document.getElementById('successCard');

        // When she clicks Yes
        yesBtn.addEventListener('click', () => {
            questionCard.classList.add('hidden');
            successCard.classList.remove('hidden');
        });

        // Track if the animation is currently running to prevent overlaps
        let isDriving = false;

        function transformAndDrive(e) {
            if (isDriving) return;
            isDriving = true;

            // 1. Transform: Instantly make it look like a "Honda Accord"
            noBtn.classList.add('noBtn-hovered');

            // 2. Position: Get current relative position for absolute locking
            const rect = noBtn.getBoundingClientRect();
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${rect.left}px`;
            noBtn.style.top = `${rect.top}px`;
            noBtn.style.margin = '0'; // Remove default button margins

            // 3. Drive: Trigger the animation
            noBtn.classList.add('driving');

            // 4. Reset: Cleanup after the animation completes
            noBtn.addEventListener('animationend', () => {
                noBtn.classList.remove('driving', 'noBtn-hovered');
                // Return to initial style structure but hide it until next hover
                noBtn.style.position = 'relative';
                noBtn.style.left = '';
                noBtn.style.top = '';
                noBtn.style.opacity = '1'; // Ensure it's not permanently invisible
                
                // Keep it locked hidden until the mouse moves away and back
                noBtn.style.display = 'none';
                setTimeout(() => {
                    noBtn.style.display = ''; // Re-enable for the next pass
                    isDriving = false;
                }, 100); 

            }, { once: true });
        }

        // Trigger on mouse hover (desktop)
        noBtn.addEventListener('mouseover', transformAndDrive);

        // Trigger on touch start (mobile)
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent accidental click while transforming
            transformAndDrive(e);
        });
    </script>
</body>
</html>
